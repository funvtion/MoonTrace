name: CI

on:
  push:
  pull_request:

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit CLI
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Show versions
        run: moon version
      - name: Check
        run: moon check
      - name: Test
        run: moon test
